name: 'OBS Tooling Setup'
description: >
  Install percona-obs Python dependencies and write osc credentials.
  Must run after actions/checkout so requirements.txt is available.

inputs:
  obs-apiurl:
    description: 'OBS API URL (e.g. http://my-obs:3000)'
    required: true
  obs-user:
    description: 'OBS username'
    required: true
  obs-password:
    description: 'OBS password'
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install percona-obs
      shell: bash
      run: |
        python -m venv venv
        venv/bin/pip install --quiet -r requirements.txt

    # Install OBS service binaries required by percona-obs sync push when
    # packages have local services (obs_scm, go_modules, …).
    # obs-service-tar-scm (provides obs_scm) is available via the
    # openSUSE:Tools apt repo.  obs-service-go-modules is not packaged for
    # Ubuntu, so it is installed directly from its upstream source repo.
    - name: Install OBS service binaries
      shell: bash
      run: |
        . /etc/os-release
        REPO_URL="https://download.opensuse.org/repositories/openSUSE:/Tools/xUbuntu_${VERSION_ID}"
        curl -fsSL "${REPO_URL}/Release.key" \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/obs-tools.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/obs-tools.gpg] ${REPO_URL}/ ./" \
          | sudo tee /etc/apt/sources.list.d/obs-tools.list > /dev/null
        sudo apt-get update -qq
        sudo apt-get install -y obs-service-tar-scm

        # obs-service-go-modules is a shell script; install from source.
        TMP=$(mktemp -d)
        git clone --depth=1 https://github.com/openSUSE/obs-service-go_modules.git "$TMP"
        sudo install -m 755 "$TMP/go_modules" /usr/lib/obs/service/go_modules
        rm -rf "$TMP"

        # go_modules uses '#!/usr/bin/env python3' so it picks up the Python
        # set by actions/setup-python (3.11), not the system Python.
        # Install libarchive-c for that same Python via pip.
        pip install libarchive-c

    # Write ~/.config/osc/oscrc via Python so special characters in the
    # password are handled correctly without any shell quoting concerns.
    - name: Write osc credentials
      shell: bash
      env:
        OBS_APIURL: ${{ inputs.obs-apiurl }}
        OBS_USER: ${{ inputs.obs-user }}
        OBS_PASSWORD: ${{ inputs.obs-password }}
      run: |
        python3 - <<'PYEOF'
        import configparser, os, pathlib
        apiurl = os.environ['OBS_APIURL']
        c = configparser.RawConfigParser()
        c['general'] = {'apiurl': apiurl}
        c[apiurl] = {'user': os.environ['OBS_USER'], 'pass': os.environ['OBS_PASSWORD']}
        p = pathlib.Path.home() / '.config' / 'osc' / 'oscrc'
        p.parent.mkdir(parents=True, exist_ok=True)
        with open(p, 'w') as f:
            c.write(f)
        PYEOF
