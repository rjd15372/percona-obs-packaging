title: Percona OBS Packaging
description: "OBS RPM and DEB packaging for Percona products."
repositories:
  - name: RockyLinux_9
    paths:
      - project: ${REMOTE_OBS_ORG_INTERCONNECT}RockyLinux:9
        repository: standard
      - project: ${REMOTE_OBS_ORG_INTERCONNECT}Fedora:EPEL:9
        repository: standard
      - subproject: builddep
        repository: RockyLinux_9
    archs: [x86_64]
  - name: Debian_13
    paths:
      - project: ${REMOTE_OBS_ORG_INTERCONNECT}Debian:13
        repository: standard
      - subproject: builddep
        repository: Debian_13
    archs: [x86_64]
  - name: xUbuntu_24.04
    paths:
      - project: ${REMOTE_OBS_ORG_INTERCONNECT}Ubuntu:24.04
        repository: universe
      - subproject: builddep
        repository: xUbuntu_24.04
    archs: [x86_64]
project-config: |
  %if "%_repository" == "RockyLinux_8" || "%_repository" == "RHEL-8"  || "%_repository" == "RedHat_RHEL-8"
  ExpandFlags: module:llvm-toolset-rhel8
  # so that we get perl-IO-Socket-SSL
  ExpandFlags: module:perl-5.26
  ExpandFlags: module:perl-IO-Socket-SSL-2.066
  ExpandFlags: module:python36-3.6
  Prefer: selinux-policy-targeted
  %endif

  %if "%_repository" == "RockyLinux_9"
  ExpandFlags: module:llvm-toolset-rhel9
  # hdf-libs (EPEL split package) and hdf both provide libdf.so.0 and libmfhdf.so.0
  Prefer: hdf-libs
  %endif

  %if "%_repository" == "Debian_13" || "%_repository" == "xUbuntu_24.04"
  # libgdal-dev transitively requires both libcurl4-openssl-dev and
  # libcurl4-gnutls-dev which conflict; ignore the gnutls variant so
  # the openssl variant is used consistently.
  Ignore: libcurl4-gnutls-dev
  # libgdal-dev and several of its deps use libjpeg-dev which is provided
  # by both libjpeg62-turbo-dev and libjpeg-dev; prefer the turbo variant.
  Prefer: libjpeg62-turbo-dev
  %endif

